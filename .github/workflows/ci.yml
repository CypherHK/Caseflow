name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run python -m ruff check src tests scripts

      - name: Test
        run: uv run python -m pytest -q

      - name: Evaluate CaseFlow
        env:
          USE_FAKE_MODEL: "true"
          DEFAULT_MODEL: "fake"
          OPENAI_API_KEY: "test-openai-key"
        run: uv run python scripts/evaluate_caseflow.py
